<!-- HERO SLIDER -->
<div class="hero-slider">

    <div class="slide active" style="background-image:url('{{ site.baseurl }}/images/fulls/la_moon.jpg')"></div>

    <div class="slide" style="background-image:url('{{ site.baseurl }}/images/fulls/ur_archpark.jpg')"></div>

    <div class="slide" style="background-image:url('{{ site.baseurl }}/images/fulls/ve_cadillo.jpg')"></div>

</div>

<!-- SCRIPT SLIDER -->
<script>
const slides = document.querySelectorAll(".slide");
let index = 0;

function nextSlide() {
    const current = slides[index];

    // prepara siguiente
    index = (index + 1) % slides.length;
    const next = slides[index];

    // activa siguiente primero
    next.classList.add("active");

    // luego desactiva actual (suave)
    setTimeout(() => {
        current.classList.remove("active");
    }, 1200);
}

setInterval(nextSlide, 5500);
</script>
