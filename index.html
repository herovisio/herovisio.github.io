<!-- HERO SLIDER -->
<div class="hero-slider">

    <div class="slide active" style="background-image:url('{{ site.baseurl }}/images/fulls/la_moon.jpg')"></div>

    <div class="slide" style="background-image:url('{{ site.baseurl }}/images/fulls/ur_archpark.jpg')"></div>

    <div class="slide" style="background-image:url('{{ site.baseurl }}/images/fulls/ve_cadillo.jpg')"></div>

</div>

<!-- SCRIPT SLIDER -->
<script>
let slides = document.querySelectorAll(".slide");
let index = 0;

setInterval(() => {
    slides[index].classList.remove("active");
    index = (index + 1) % slides.length;
    slides[index].classList.add("active");
}, 4000);
</script>
