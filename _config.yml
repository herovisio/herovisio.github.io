# Base configs
image_fulls_loc: "/images/fulls"
image_thumbs_loc: "/images/thumbs"

# Site URL (IMPORTANTE para SEO + sitemap)
url: "https://herovisio.com"

# Google Analytics (GA4)
google_analytics: "G-FPC17X6JC2"

# UI configs
title: "HeroVisio"
subtitle: "Visual stories by Hero"
author: "Hero"

header:
  title: "HeroVisio"
  subtitle: "Photography & Creative Vision"

footer:
  name: "HeroVisio"
  bio: "I am a photographer passionate about capturing everyday moments, urban scenes, and natural landscapes through my lens."

web_design: "AJ"

# EXIF data (camera info on images)
exif: '[{"tag": "Model", "icon": "camera-retro"}, {"tag": "FNumber", "icon": "dot-circle-o"}, {"tag": "ExposureTime", "icon": "clock-o"}, {"tag": "ISOSpeedRatings", "icon": "info-circle"}]'

social_urls:
  facebook: ""
  instagram: "https://www.instagram.com/herovisio"

# =====================
# SEO + SITEMAP (NUEVO)
# =====================

plugins:
  - jekyll-sitemap
  - jekyll-seo-tag

# SEO defaults (mejora Google)
description: "Herovisio is a photography project focused on urban photography, people, nature, and visual storytelling."
lang: "en"
