<!DOCTYPE HTML>
<html lang="en">

<head>
  {% include header.html %}
</head>

<body>

  <!-- NAVBAR GLOBAL (ANTES SOLO ESTABA EN INDEX) -->
  <nav class="main-menu">

    <div class="logo">
      <a href="{{ site.baseurl }}/">
        <img src="{{ site.baseurl }}/images/herovisio-logo.png" alt="HEROVISIO">
      </a>
    </div>

    <ul class="menu-items">
      <li class="dropdown">
        <a href="#">Gallery ▾</a>
        <ul class="dropdown-menu">
          <li><a href="{{ site.baseurl }}/urban">Urban</a></li>
          <li><a href="{{ site.baseurl }}/people">People</a></li>
          <li><a href="{{ site.baseurl }}/animals">Animals</a></li>
          <li><a href="{{ site.baseurl }}/vegetation">Vegetation</a></li>
          <li><a href="{{ site.baseurl }}/landscapes">Landscapes</a></li>
          <li><a href="{{ site.baseurl }}/objects">Objects</a></li>
        </ul>
      </li>

      <li><a href="{{ site.baseurl }}/about">About</a></li>
    </ul>

  </nav>

  {{ content }}

  {% include footer.html %}
<div class="lightbox" id="lightbox">
  <img id="lightbox-img" src="" alt="">
</div>
<script>
const images = document.querySelectorAll(".gallery-grid img");
const lightbox = document.getElementById("lightbox");
const lightboxImg = document.getElementById("lightbox-img");

// abrir
images.forEach(img => {
  img.addEventListener("click", () => {
    lightbox.classList.add("active");
    lightboxImg.src = img.src;
  });
});

// cerrar al hacer clic fuera o en X
lightbox.addEventListener("click", () => {
  lightbox.classList.remove("active");
  lightboxImg.src = "";
});
</script>


</body>

</html>
